<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery - Foodie</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #f8f8f8;
        }

        /* Header */
        header {
            background-color: #ff4d4d;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
        }

        .logo {
            font-size: 22px;
            font-weight: bold;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 20px;
        }

        nav ul li a {
            text-decoration: none;
            color: white;
            font-weight: 500;
        }

        nav ul li a:hover {
            text-decoration: underline;
        }

        /* Gallery Section */
        .gallery {
            padding: 60px 20px;
            text-align: center;
        }

        .gallery h1 {
            font-size: 36px;
            margin-bottom: 10px;
            color: #333;
        }

        .gallery p {
            color: #666;
            margin-bottom: 30px;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            max-width: 1000px;
            margin: auto;
        }

        .gallery-grid img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 10px;
            transition: 0.3s;
        }

        .gallery-grid img:hover {
            transform: scale(1.05);
        }

        /* Footer */
        footer {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 15px;
            margin-top: 50px;
        }
    </style>
</head>

<body>

    <!-- Header -->
    <header>
        <div class="logo">🍴 Foodie</div>

        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="menu.html">Menu</a></li>
                <li><a href="order.html">Order</a></li>
                <li><a href="gallery.html">Gallery</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <!-- Gallery Section -->
    <section class="gallery">
        <h1>Our Food Gallery</h1>
        <p>Delicious moments captured from our kitchen 🍕🍔🍟</p>

        <div class="gallery-grid">
            <img src="https://source.unsplash.com/400x300/?pizza" alt="Pizza">
            <img src="https://source.unsplash.com/400x300/?burger" alt="Burger">
            <img src="https://source.unsplash.com/400x300/?pasta" alt="Pasta">
            <img src="https://source.unsplash.com/400x300/?fries" alt="Fries">
            <img src="https://source.unsplash.com/400x300/?dessert" alt="Dessert">
            <img src="https://source.unsplash.com/400x300/?food" alt="Food">
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <p>© 2026 Foodie. All Rights Reserved.</p>
    </footer>

</body>
</html>
