<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasty Bites | Order</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Header -->
    <header>
        <div class="logo">🍴 Tasty Bites</div>

        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="menu.html">Menu</a></li>
                <li><a href="gallery.html">Gallery</a></li>
                <li><a href="order.html">Order</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <!-- Order Section -->
    <section class="order">
        <h1>Order Online</h1>
        <p>Fill in the form below to place your order.</p>

        <form>
            <label for="name">Full Name</label><br>
            <input type="text" id="name" placeholder="Enter your name" required><br><br>

            <label for="phone">Phone Number</label><br>
            <input type="tel" id="phone" placeholder="Enter your phone number" required><br><br>

            <label for="food">Select Food</label><br>
            <select id="food" required>
                <option value="">-- Choose an Item --</option>
                <option>Margherita Pizza</option>
                <option>Chicken Burger</option>
                <option>White Sauce Pasta</option>
                <option>Veg Salad</option>
                <option>French Fries</option>
                <option>Cold Coffee</option>
            </select><br><br>

            <label for="quantity">Quantity</label><br>
            <input type="number" id="quantity" min="1" value="1" required><br><br>

            <label for="address">Delivery Address</label><br>
            <textarea id="address" rows="4" placeholder="Enter your address" required></textarea><br><br>

            <button type="submit">Place Order</button>
        </form>
    </section>

    <!-- Footer -->
    <footer>
        <p>&copy; 2026 Tasty Bites. All Rights Reserved.</p>
    </footer>

    <script src="script.js"></script>

</body>
</html>
