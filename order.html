<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Online - Foodie</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #f8f8f8;
        }

        /* Header */
        header {
            background-color: #ff4d4d;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
        }

        .logo {
            font-size: 22px;
            font-weight: bold;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 20px;
        }

        nav ul li a {
            text-decoration: none;
            color: white;
            font-weight: 500;
        }

        nav ul li a:hover {
            text-decoration: underline;
        }

        /* Order Section */
        .order {
            padding: 60px 20px;
            text-align: center;
        }

        .order h1 {
            font-size: 36px;
            margin-bottom: 10px;
            color: #333;
        }

        .order p {
            color: #666;
            margin-bottom: 30px;
        }

        .order-form {
            max-width: 500px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        .order-form input,
        .order-form select,
        .order-form textarea {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        .order-form button {
            width: 100%;
            padding: 10px;
            background-color: #ff4d4d;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }

        .order-form button:hover {
            background-color: #e60000;
        }

        /* Footer */
        footer {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 15px;
            margin-top: 50px;
        }
    </style>
</head>

<body>

    <!-- Header -->
    <header>
        <div class="logo">🍴 Foodie</div>

        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="menu.html">Menu</a></li>
                <li><a href="order.html">Order</a></li>
                <li><a href="gallery.html">Gallery</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <!-- Order Section -->
    <section class="order">
        <h1>Order Online 🛒</h1>
        <p>Fill the form and get your food delivered fast 🚀</p>

        <div class="order-form">
            <form>
                <input type="text" placeholder="Your Name" required>

                <input type="tel" placeholder="Phone Number" required>

                <select required>
                    <option value="">Select Food Item</option>
                    <option>Pizza</option>
                    <option>Burger</option>
                    <option>Pasta</option>
                    <option>Fries</option>
                    <option>Cold Drink</option>
                </select>

                <input type="number" placeholder="Quantity" min="1" required>

                <textarea rows="4" placeholder="Full Address" required></textarea>

                <button type="submit">Place Order</button>
            </form>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <p>© 2026 Foodie. All Rights Reserved.</p>
    </footer>

</body>
</html>
