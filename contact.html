    <!-- Header -->

        <div class="logo">🍴 Tasty Bites</div>

    <!-- Contact Section -->
    <section class="contact">
        <h1>Contact Us</h1>
        <p>We'd love to hear from you!</p>

        <form>
            <label for="name">Name</label><br>
            <input type="text" id="name" placeholder="Enter your name" required><br><br>

            <label for="email">Email</label><br>
            <input type="email" id="email" placeholder="Enter your email" required><br><br>

            <label for="message">Message</label><br>
            <textarea id="message" rows="5" placeholder="Write your message here..." required></textarea><br><br>

            <button type="submit">Send Message</button>
        </form>

        <h2>Restaurant Details</h2>
        <p><strong>📍 Address:</strong> 123 Food Street, Vijayawada</p>
        <p><strong>📞 Phone:</strong> +91 98765 43210</p>
        <p><strong>📧 Email:</strong> info@tastybites.com</p>
    </section>

    <!-- Footer -->
    <footer>
        <p>&copy; 2026 Tasty Bites. All Rights Reserved.</p>
    </footer>

    <script src="script.js"></script>

</body>
