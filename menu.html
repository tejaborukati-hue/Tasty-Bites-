<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu - Foodie</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #f8f8f8;
        }

        /* Header */
        header {
            background-color: #ff4d4d;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
        }

        .logo {
            font-size: 22px;
            font-weight: bold;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 20px;
        }

        nav ul li a {
            text-decoration: none;
            color: white;
            font-weight: 500;
        }

        nav ul li a:hover {
            text-decoration: underline;
        }

        /* Menu Section */
        .menu {
            padding: 60px 20px;
            text-align: center;
        }

        .menu h1 {
            font-size: 36px;
            margin-bottom: 10px;
            color: #333;
        }

        .menu p {
            color: #666;
            margin-bottom: 30px;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            max-width: 1000px;
            margin: auto;
        }

        .card {
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.05);
        }

        .card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
        }

        .card-content {
            padding: 15px;
        }

        .card-content h3 {
            margin-bottom: 10px;
            color: #333;
        }

        .price {
            color: #ff4d4d;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .card-content button {
            padding: 8px 15px;
            background-color: #ff4d4d;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .card-content button:hover {
            background-color: #e60000;
        }

        /* Footer */
        footer {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 15px;
            margin-top: 50px;
        }
    </style>
</head>

<body>

    <!-- Header -->
    <header>
        <div class="logo">🍴 Foodie</div>

        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="menu.html">Menu</a></li>
                <li><a href="order.html">Order</a></li>
                <li><a href="gallery.html">Gallery</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <!-- Menu Section -->
    <section class="menu">
        <h1>Our Menu</h1>
        <p>Choose your favorite delicious food 🍕🍔🍟</p>

        <div class="menu-grid">

            <div class="card">
                <img src="https://source.unsplash.com/400x300/?pizza" alt="Pizza">
                <div class="card-content">
                    <h3>Cheese Pizza</h3>
                    <p class="price">₹199</p>
                    <button>Order Now</button>
                </div>
            </div>

            <div class="card">
                <img src="https://source.unsplash.com/400x300/?burger" alt="Burger">
                <div class="card-content">
                    <h3>Veg Burger</h3>
                    <p class="price">₹99</p>
                    <button>Order Now</button>
                </div>
            </div>

            <div class="card">
                <img src="https://source.unsplash.com/400x300/?pasta" alt="Pasta">
                <div class="card-content">
                    <h3>White Sauce Pasta</h3>
                    <p class="price">₹149</p>
                    <button>Order Now</button>
                </div>
            </div>

            <div class="card">
                <img src="https://source.unsplash.com/400x300/?fries" alt="Fries">
                <div class="card-content">
                    <h3>French Fries</h3>
                    <p class="price">₹79</p>
                    <button>Order Now</button>
                </div>
            </div>

        </div>
    </section>

    <!-- Footer -->
    <footer>
        <p>© 2026 Foodie. All Rights Reserved.</p>
    </footer>

</body>
</html>
